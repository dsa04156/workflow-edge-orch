apiVersion: v1
kind: ServiceAccount
metadata:
  name: state-aggregator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: state-aggregator-node-reader
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: state-aggregator-node-reader-binding
subjects:
  - kind: ServiceAccount
    name: state-aggregator
    namespace: default
roleRef:
  kind: ClusterRole
  name: state-aggregator-node-reader
  apiGroup: rbac.authorization.k8s.io
