name: Build and Push Images to Local Registry

on:
  push:
    branches:
      - main
    paths:
      - 'state-aggregator/**'
      - 'workflow_executor/**'
      - 'placement_engine/**'
      - 'vision_stage_runner/**'
      - 'workflow_reporter/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build and Push state-aggregator
        run: |
          docker build -t 192.168.0.56:5000/state-aggregator:latest -f state-aggregator/Dockerfile state-aggregator
          docker push 192.168.0.56:5000/state-aggregator:latest

      - name: Build and Push workflow-executor
        run: |
          docker build -t 192.168.0.56:5000/workflow-executor:latest -f workflow_executor/Dockerfile workflow_executor
          docker push 192.168.0.56:5000/workflow-executor:latest

      - name: Build and Push placement-engine
        run: |
          docker build -t 192.168.0.56:5000/placement-engine:latest -f placement_engine/Dockerfile placement_engine
          docker push 192.168.0.56:5000/placement-engine:latest

      - name: Build and Push vision-stage-runner
        run: |
          docker build -t 192.168.0.56:5000/vision-stage-runner:latest -f vision_stage_runner/Dockerfile vision_stage_runner
          docker push 192.168.0.56:5000/vision-stage-runner:latest
